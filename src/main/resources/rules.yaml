# TDA bundled detection rules - the frame-scan built-ins, expressed on the same rules DSL
# available to users via --rules. A user rule with the same id overrides the bundled one.
#
# Schema (see README "Rules DSL"):
#   - id: unique finding id
#     title: text; {count} and {dump} placeholders are filled in
#     severity: info|warning|critical      # the CAP (Rule 5 still applies)
#     warnThreads: N        # optional: below N matches the finding degrades to INFO
#     criticalThreads: N    # optional: matches needed to actually reach a CRITICAL cap
#     recommendation: text
#     match:
#       frames:             # any stack frame containing any needle
#         - substring
#       threadNameRegex: "regex"          # optional, full-name match
#       states:                           # optional, restricts thread states
#         - BLOCKED
#       minThreads: N       # per-dump floor (default 1)
#       persistDumps: K     # optional: same thread must match in >= K consecutive dumps
#       cpuDelta: any|zero|spinning       # optional: needs cpu= fields (JDK 11+)
rules:
  - id: connection-pool-exhaustion
    title: "{count} threads waiting for a database connection"
    severity: critical
    criticalThreads: 10
    recommendation: Check what the threads that DO hold connections are executing (often stuck in socketRead0 on a slow query). Review pool max size vs. concurrent workers, enable leak detection (HikariCP leakDetectionThreshold, UCP InactiveConnectionTimeout, WebLogic Inactive Connection Timeout), and set statement timeouts so one slow query cannot pin a connection forever.
    match:
      frames:
        - com.zaxxer.hikari.util.ConcurrentBag.borrow
        - com.zaxxer.hikari.pool.HikariPool.getConnection
        - oracle.ucp.jdbc.PoolDataSourceImpl.getConnection
        - oracle.ucp.common.UniversalConnectionPoolBase.borrowConnection
        - weblogic.jdbc.common.internal.ConnectionPool.reserve
        - weblogic.common.resourcepool.ResourcePoolImpl.reserveResource
        - org.apache.commons.dbcp2.PoolingDataSource.getConnection
        - org.apache.commons.pool2.impl.GenericObjectPool.borrowObject
        - org.apache.tomcat.jdbc.pool.ConnectionPool.borrowConnection
        - com.mchange.v2.resourcepool.BasicResourcePool.awaitAvailable
        - com.ibm.ws.j2c.poolmanager.FreePool.createOrWaitForConnection
        - com.ibm.ejs.j2c.FreePool.createOrWaitForConnection
      states:
        - WAITING
        - TIMED_WAITING
        - BLOCKED
      minThreads: 3
  - id: sync-logging-bottleneck
    title: "{count} threads BLOCKED on synchronized logging"
    severity: critical
    criticalThreads: 10
    recommendation: Switch to async logging (Log4j2 AsyncAppender/AsyncLogger, Logback AsyncAppender) or reduce log volume on hot paths. Never log to console in production - stdout is often the slowest sink.
    match:
      frames:
        - org.apache.log4j.Category.callAppenders
        - org.apache.log4j.AppenderSkeleton.doAppend
        - org.apache.logging.log4j.core.appender.OutputStreamManager
        - ch.qos.logback.core.OutputStreamAppender
        - ch.qos.logback.core.AppenderBase.doAppend
        - java.util.logging.Logger.log
        - java.util.logging.StreamHandler.publish
      states:
        - BLOCKED
      minThreads: 3
  - id: classloader-contention
    title: "{count} threads BLOCKED in class loading"
    severity: warning
    recommendation: Warm the application before admitting traffic, make custom classloaders parallel-capable (registerAsParallelCapable), and cache Class.forName / reflection lookups instead of resolving per request.
    match:
      frames:
        - java.lang.ClassLoader.loadClass
        - .loadClass
      states:
        - BLOCKED
      minThreads: 3
  - id: weblogic-jta-wait
    title: "{count} threads inside WebLogic JTA transaction processing"
    severity: warning
    criticalThreads: 10
    recommendation: Check the JTA timeout (JTAMBean TimeoutSeconds) and the health of every XA resource enlisted in these transactions (JDBC XA data sources, JMS). Long two-phase commits usually mean one participant is not answering; transaction log (tlog) I/O stalls show the same picture.
    match:
      frames:
        - weblogic.transaction.internal.ServerTransactionImpl.commit
        - weblogic.transaction.internal.ServerTransactionImpl.internalCommit
        - weblogic.transaction.internal.TransactionImpl.globalPrepare
        - weblogic.transaction.internal.TransactionImpl.globalCommit
      states:
        - WAITING
        - TIMED_WAITING
        - BLOCKED
      minThreads: 3
  - id: weblogic-t3-peer-hang
    title: "{count} threads waiting on t3/RMI replies from another WebLogic server"
    severity: warning
    criticalThreads: 8
    recommendation: Identify the peer server from the stacks and check its health - a hung peer propagates through the cluster via t3 waits. Set a reasonable RMI timeout (weblogic.rmi.clientTimeout / per-stub timeouts) so one dead peer cannot pin caller threads forever.
    match:
      frames:
        - weblogic.rjvm.ResponseImpl.waitForData
        - weblogic.rmi.internal.BasicOutboundRequest.sendReceive
      minThreads: 2
      persistDumps: 2
  - id: weblogic-ldap-auth-stall
    title: "{count} threads stalled in WebLogic security/LDAP authentication"
    severity: warning
    criticalThreads: 10
    recommendation: Check the LDAP provider's connect/read timeouts in the authentication provider settings and the directory server's health. Authentication stalls serialize logins and can exhaust the execute queue during a login storm.
    match:
      frames:
        - weblogic.security.providers.authentication
        - netscape.ldap.LDAPConnection
        - com.bea.common.security.internal.service
      states:
        - WAITING
        - TIMED_WAITING
        - RUNNABLE
      minThreads: 3
      persistDumps: 2
  - id: tomcat-session-replication-blocked
    title: "{count} threads BLOCKED in Tomcat session replication/clustering"
    severity: warning
    criticalThreads: 8
    recommendation: Check Tribes cluster membership and network health between nodes (multicast/unicast). Consider BackupManager instead of DeltaManager for large clusters, and keep sessions small - replication serializes the whole session under a lock.
    match:
      frames:
        - org.apache.catalina.tribes.
        - org.apache.catalina.ha.session.
      states:
        - BLOCKED
      minThreads: 3
  - id: tomcat-jsp-compilation-storm
    title: "{count} threads compiling JSPs on the request path"
    severity: warning
    recommendation: Precompile JSPs at build time (jspc) or warm the server before admitting traffic. In production set development=false on the JspServlet so Jasper stops checking for JSP changes per request.
    match:
      frames:
        - org.apache.jasper.compiler.
      states:
        - RUNNABLE
        - BLOCKED
      minThreads: 3
  - id: websphere-sib-wait
    title: "{count} threads waiting inside the WebSphere default messaging engine (SIB)"
    severity: warning
    criticalThreads: 10
    recommendation: Check the SIB messaging engine's state (started/stopped, message store health) and destination queue depths. Consumer threads pinned in SIB receive with a stopped engine look exactly like this.
    match:
      frames:
        - com.ibm.ws.sib.
        - com.ibm.websphere.sib.
      states:
        - WAITING
        - TIMED_WAITING
        - BLOCKED
      minThreads: 5
      persistDumps: 2
  - id: exception-processing
    title: "{count} thread(s) actively constructing/printing exceptions"
    severity: warning
    warnThreads: 5
    recommendation: Find the exception source and fix the root cause or stop using exceptions on the hot path. -XX:+OmitStackTraceInFastThrow deduplicates in fast throw loops - stackless exceptions in the logs mean the storm has been running a while.
    match:
      frames:
        - java.lang.Throwable.fillInStackTrace
        - java.lang.Throwable.printStackTrace
        - java.lang.Throwable.getStackTrace
        - java.lang.Throwable.getOurStackTrace
        - java.lang.ExceptionInInitializerError
      states:
        - RUNNABLE
        - BLOCKED
      minThreads: 1
